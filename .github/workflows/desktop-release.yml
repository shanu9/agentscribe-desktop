name: Build desktop installers

# Builds the AgentScribe Windows installer (.exe) and uploads it to a GitHub
# Release — so you never run a build command by hand.
#
# macOS is NOT built here: the .dmg is hosted on Azure Blob (see the website's
# scribe/download/links.ts). To add signed mac CI later, re-add a
# `{ os: macos-latest, args: --mac }` matrix entry plus the Apple signing
# secrets below.
#
# How to cut a release:
#   1. Bump "version" in package.json (e.g. 0.1.0 → 0.2.0).
#   2. Commit, then tag it to MATCH:  git tag v0.2.0 && git push --tags
#   3. This workflow builds the installer and attaches it to a DRAFT release.
#   4. Open the release on GitHub, review, and click "Publish release".
#      Only then do the website's /releases/latest/download/... links go live.
#
# Unsigned by default (works for testing; users see a SmartScreen warning). To
# sign, add the optional Windows code-signing secrets referenced below.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write # required to create/update Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Build only — do NOT let electron-builder publish. Its GitHub uploader
      # is flaky for the large .exe (it reported "overwrite … already exists"
      # yet dropped the installer, leaving only the blockmap). We upload with a
      # dedicated action below instead — the same reliable pattern the mobile
      # APK workflow uses.
      - name: Build installer
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          # ── Optional code-signing / notarization ────────────────────────
          # Leave these secrets unset for unsigned builds. When present,
          # electron-builder signs (and on macOS, notarizes) automatically.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      # Reliable upload: installer + blockmap + latest.yml (electron-updater
      # reads latest.yml to offer in-app updates). Published straight to the
      # tag's release so /releases/latest/download/... resolves immediately.
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/AgentScribe-Setup.exe
            dist/AgentScribe-Setup.exe.blockmap
            dist/latest.yml
          draft: false
          make_latest: true
